server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Resolver de Docker (DNS interno) ──────────────────────────
    # Con variable en proxy_pass, nginx resuelve el hostname en cada
    # request (no al arrancar), así NO falla si backend no está en red.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ─── Proxy inverso al API del backend ──────────────────────────
    location /api/ {
        set $backend http://backend:3000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # ─── WebSocket (Socket.io) ──────────────────────────────────────
    location /socket.io/ {
        set $backend http://backend:3000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ─── SPA fallback — todas las rutas al index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Gzip ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml
        application/xml;

    # ─── Cache de assets estáticos ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
